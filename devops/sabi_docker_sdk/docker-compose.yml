# Before running docker compose make sure that you have build the captcha and sabi project, otherwise
# the container won't have access to the current jars.
services:
  captcha:
    # available by http://localhost:8081/captcha/swagger-ui.html
    container_name: captcha-as
    build: ./captcha
    platform: linux/amd64
    networks:
      - sabinet
    ports:
      - "8081:8081"
  sabi-backend:
    # available by http://localhost:8080/sabi/swagger-ui.html
    container_name: sabi-as
    build: ./sabi-backend
    platform: linux/amd64
    environment:
      - TZ=Europe/Berlin
      # Aktiviert application-local.yml für lokale Google-OIDC-Tests.
      # nicht im Repo, da **/application-local.yml in .gitignore steht) und aufgrund des secrets nicht committet werden darf.
      - SPRING_PROFILES_ACTIVE=local
      - SABI_FISH_PHOTO_STORAGE_DIR=/var/sabi-data/fish-photos
      - SABI_FISH_AQUARIUM_STORAGE_DIR=/var/sabi-data/aquarium-photos
    volumes:
      - sabi-fish-photos:/var/sabi-data/fish-photos
      - sabi-aquarium-photos:/var/sabi-data/aquarium-photos
    networks:
      - sabinet
    ports:
      - "8080:8080"
      - "8880:8880"
    depends_on:
      - db
  flyway:
    image: flyway/flyway:12.1.0-alpine
    platform: linux/amd64
    command: -url=jdbc:mariadb://db:3306/sabi -defaultSchema=sabi -schemas=sabi -user=sabiapp -password=sabi123 -connectRetries=60 baseline migrate
    volumes:
      - ../../sabi-database/src/main/resources:/flyway/sql
    networks:
      - sabinet
    depends_on:
      - db
  db:
    image: mariadb:12.2.2
    platform: linux/amd64
    environment:
      - MYSQL_ROOT_PASSWORD=SuperDooper
      - MYSQL_DATABASE=sabi
      - MYSQL_USER=sabiapp
      - MYSQL_PASSWORD=sabi123
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - sabinet
    ports:
      - "3306:3306"
  fakeSMTP:
    image: gessnerfl/fake-smtp-server:2.5.0
    platform: linux/amd64
    environment:
      - server.port=5080
      - fakesmtp.port=2525
      - fakesmtp.authentication.username=sabi@bluewhale.de
      - fakesmtp.authentication.password=YouWillNeverKnow
    networks:
      - sabinet
    ports:
      - "2525:2525"
      - "5080:5080"
# Monitoring Sample with Prometheus Grafana
  grafana:
    image: grafana/grafana:12.3
    platform: linux/amd64
    volumes:
     - ./grafanaData:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - sabinet
    depends_on:
      - prometheus
  prometheus:
    image: prom/prometheus:v3.9.1
    platform: linux/amd64
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command: "--config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus"
    networks:
      - sabinet
    ports:
      - "9090:9090"

networks:
  sabinet:
    driver: bridge

volumes:
  # Fish photo storage — persistent across container restarts (T072)
  sabi-fish-photos:
  sabi-aquarium-photos:


# TODO: application.properties files contains "localhost" this does not matches the hosts,
# db, fakeSMTP etc.. so the application.properties need to be externalized as in production
# through the assets.