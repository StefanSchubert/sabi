- hosts: sabiMiddleware
  vars_files:
    - ./group_vars/sabiMiddleware.yml
  tasks:
    - name: Wait for Pi to become reachable (may need wakeup time)
      wait_for_connection:
        delay: 5
        sleep: 5
        timeout: 120

    - name: Create Captcha User
      user:
        name: captcha
        create_home: false
        shell: /usr/sbin/nologin
        comment: "captcha Service Account, no login possible."
        expires: -1
    - name: Create captcha directory
      file:
        path: /var/captcha
        state: directory
        owner: captcha
        group: captcha
    - name: Copy new jar file
      copy:
        src: /Users/bluewhale/dev/Intellij-wss/github/sabi.git/captcha/target/captcha-service.jar
        dest: /var/captcha
        owner: captcha
        group: captcha
        mode: '0500'
    - name: Copy JVM config file
      copy:
        src: /Users/bluewhale/dev/Intellij-wss/github/sabi.git/captcha/captcha-service.conf
        dest: /var/captcha
        owner: captcha
        group: captcha
        mode: '0444'
    - name: Drop old tmp folder
      file:
        state: absent
        path: /var/captcha/tmp
    - name: reCreate captchas own tmp directory
      file:
        path: /var/captcha/tmp
        state: directory
        owner: captcha
        group: captcha
    - name: reCreate captchas own log directory
      file:
        path: /var/captcha/logs
        state: directory
        owner: captcha
        group: captcha
    - name: Copy systemd service file to server
      copy:
        src: captchaBE.service
        dest: /etc/systemd/system/captcha.service
        owner: root
        group: root
    - name: enforce deamon config reload
      command: systemctl daemon-reload
    - name: Enable service captcha and ensure it is not masked
      systemd:
        name: captcha
        enabled: yes
        masked: no
      async: 120
    - name: Start captcha service
      systemd:
        name: captcha
        state: restarted
