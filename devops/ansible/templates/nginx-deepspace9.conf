# Nginx configuration for {{ domain_name }}
# Reverse proxy for Prometheus and Grafana monitoring

# Upstream definitions
upstream grafana {
    server [::1]:3000;  # IPv6 localhost
}

# Prometheus is accessed directly from local network, not via Nginx reverse proxy
# Grafana connects to Prometheus locally: http://[::1]:9090/prometheus

# HTTP Server - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name {{ domain_name }};

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{ domain_name }};

    # SSL Configuration (will be updated by certbot)
    ssl_certificate /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{ domain_name }}/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/{{ nginx_conf_name }}_access.log;
    error_log /var/log/nginx/{{ nginx_conf_name }}_error.log;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Grafana reverse proxy
    location /grafana/ {
        proxy_pass http://grafana;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;

        proxy_redirect off;
    }

    # Prometheus is NOT exposed via Nginx (security decision)
    # Access only from local network:
    # - Local: http://deepspace-9:9090/prometheus/
    # - Local: http://[::1]:9090/prometheus/
    # - SSH Tunnel: ssh -L 9090:localhost:9090 pi@deepspace-9.bluewhale.de
    # Grafana accesses Prometheus locally: http://[::1]:9090/prometheus

    # Default location - just provide an OK
    location = / {
        return 200 "OK\n";
    }
}

