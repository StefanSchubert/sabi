# Nginx configuration for sabi-project.net (shangri-la)
# SSL termination + reverse proxy to Spring Boot (sabiFE on port 8088)

# HTTP → HTTPS redirect
server {
    listen [::]:80;
    server_name sabi-project.net;
    return 301 https://$server_name$request_uri;
}

# HTTPS reverse proxy
server {
    listen [::]:443 ssl http2;
    server_name sabi-project.net;

    # SSL (managed by certbot)
    include snippets/letsencrypt-cert.conf;
    include snippets/ssl-params.conf;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/sabi_access.log;
    error_log  /var/log/nginx/sabi_error.log;

    # Grafana (runs locally on port 3000)
    location /grafana {
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_pass http://[::1]:3000;
    }

    # Sabi webclient (Spring Boot on port 8088)
    location / {
        proxy_pass http://[::1]:8088;

        # CRITICAL: These headers allow Spring Boot (forward-headers-strategy: native)
        # to reconstruct the correct https:// redirect-URI for OAuth2/Google login.
        # Without X-Forwarded-Proto Spring Boot builds redirect_uri as http:// → Google 400.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        # JSF requires larger buffers (ViewState)
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}

