- hosts: sabiFrontend
  vars_files:
    - ./group_vars/sabiFrontend.yml
  tasks:
    - name: Wait for Pi to become reachable (may need wakeup time)
      wait_for_connection:
        delay: 5
        sleep: 5
        timeout: 120

    - name: Adding existing user "sabi" to group video for being able to use vcgencmd
      user:
        name: sabi
        groups: video
        append: yes
    - name: Create sabi directory
      file:
        path: /var/sabi
        state: directory
        owner: sabi
        group: sabi
#    - name: Stop existing webservice service
#      systemd:
#        name: sabi
#        state: stopped
    - name: Drop old tmp folder
      file:
        state: absent
        path: /var/sabi/tmp
    - name: reCreate sabis own tmp directory
      file:
        path: /var/sabi/tmp
        state: directory
        owner: sabi
        group: sabi
    - name: reCreate sabis own log directory
      file:
        path: /var/sabi/logs
        state: directory
        owner: sabi
        group: sabi
    - name: Copy new jar file
      copy:
        src: /Users/bluewhale/dev/Intellij-wss/github/sabi.git/sabi-webclient/target/sabi-webclient.jar
        dest: /var/sabi/sabi-webclient.jar
        owner: sabi
        group: sabi
        mode: '0500'
    - name: Copy JVM config file
      copy:
        src: /Users/bluewhale/dev/Intellij-wss/github/sabi.git/sabi-webclient/sabi-webclient.conf
        dest: /var/sabi
        owner: sabi
        group: sabi
        mode: '0444'
    - name: Ensure /etc/sabi config directory exists
      file:
        path: /etc/sabi
        state: directory
        owner: root
        group: sabi
        mode: '0750'
    - name: Deploy OIDC secrets env file (sabi-150)
      copy:
        content: |
          SPRING_PROFILES_ACTIVE={{ spring_profiles_active }}
          GOOGLE_OIDC_CLIENT_ID={{ sabi_google_oidc_client_id }}
          GOOGLE_OIDC_CLIENT_SECRET={{ sabi_google_oidc_client_secret }}
        dest: /etc/sabi/sabi-frontend.env
        owner: root
        group: sabi
        mode: '0640'
      no_log: true
    - name: Copy systemd service file to server
      copy:
        src: sabiFE.service
        dest: /etc/systemd/system/sabi.service
        owner: root
        group: root
    - name: enforce daemon config reload
      command: systemctl daemon-reload
    - name: Enable service sabi and ensure it is not masked
      systemd:
        name: sabi
        enabled: yes
        masked: no
      async: 120
    - name: Start sabi service
      systemd:
        name: sabi
        state: restarted
