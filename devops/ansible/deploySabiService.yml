- hosts: sabiMiddleware
  vars_files:
    - ./group_vars/sabiMiddleware.yml
  tasks:
    - name: Wait for Pi to become reachable (may need wakeup time)
      wait_for_connection:
        delay: 5
        sleep: 5
        timeout: 120

    - name: Create Sabi User
      user:
        name: sabi
        create_home: false
        shell: /usr/sbin/nologin
        comment: "sabi Service Account, no login possible."
        expires: -1
    - name: Create sabi directory
      file:
        path: /var/sabi
        state: directory
        owner: sabi
        group: sabi
    # User Group Management for Backups
    - name: Add pi user to sabi group (for scp backups)
      user:
        name: "{{ ansible_user }}"
        groups: sabi
        append: yes
    - name: Copy new jar file
      copy:
        src: /Users/bluewhale/dev/Intellij-wss/github/sabi.git/sabi-server/target/sabi-service.jar
        dest: /var/sabi/sabi-service.jar
        owner: sabi
        group: sabi
        mode: '0500'
    - name: Copy JVM config file
      copy:
        src: /Users/bluewhale/dev/Intellij-wss/github/sabi.git/sabi-server/sabi-service.conf
        dest: /var/sabi
        owner: sabi
        group: sabi
        mode: '0444'
    - name: ensure config dir exsists
      file:
        path: /var/sabi/config
        state: directory
        owner: sabi
        group: sabi
    - name: Drop old tmp folder
      file:
        state: absent
        path: /var/sabi/tmp
    - name: reCreate sabis own tmp directory
      file:
        path: /var/sabi/tmp
        state: directory
        owner: sabi
        group: sabi
    - name: reCreate sabis own log directory
      file:
        path: /var/sabi/logs
        state: directory
        owner: sabi
        group: sabi
    - name: Copy systemd service file to server
      copy:
        src: sabiBE.service
        dest: /etc/systemd/system/sabi.service
        owner: root
        group: root
    - name: Ensure /etc/sabi config directory exists
      file:
        path: /etc/sabi
        state: directory
        owner: root
        group: sabi
        mode: '0750'
    - name: Create fish photo storage directory (T074 — 002-fish-stock-catalogue)
      file:
        path: "{{ sabi_fish_photo_dir | default('/var/sabi-data/fish-photos') }}"
        state: directory
        owner: sabi
        group: sabi
        mode: '0750'
    - name: Deploy OIDC client-id env file (sabi-150)
      copy:
        content: |
          SPRING_PROFILES_ACTIVE={{ spring_profiles_active }}
          GOOGLE_OIDC_CLIENT_ID={{ sabi_google_oidc_client_id }}
          GOOGLE_OIDC_CLIENT_SECRET={{ sabi_google_oidc_client_secret }}
          SABI_DB_PASSWORD={{ sabi_db_password }}
          SABI_JWT_SECRET={{ sabi_jwt_secret }}
          SABI_SMTP_HOST={{ sabi_smtp_host }}
          SABI_SMTP_PORT={{ sabi_smtp_port }}
          SABI_SMTP_USER={{ sabi_smtp_user }}
          SABI_SMTP_PASSWORD={{ sabi_smtp_password }}
        dest: /etc/sabi/sabi-backend.env
        owner: root
        group: sabi
        mode: '0640'
      no_log: true
    - name: enforce deamon config reload
      command: systemctl daemon-reload
    - name: Enable service sabi and ensure it is not masked
      systemd:
        name: sabi
        enabled: yes
        masked: no
      async: 120
    - name: Start sabi service
      systemd:
        name: sabi
        state: restarted
