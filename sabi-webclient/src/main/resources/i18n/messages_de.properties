ipv6info.title.h=SABI – IPv6-only Dienst
ipv6info.intro.t=SABI ist ausschließlich über IPv6 erreichbar. Hier erklären wir kurz, was das bedeutet und warum der Dienst aus bestimmten Netzwerken heraus nicht zugänglich ist.
ipv6info.whatis.h=Was ist IPv6?
ipv6info.whatis.t=Das Internet nutzt Adressen, um Geräte zu identifizieren – ähnlich wie Hausnummern. IPv4 (die ältere Version) verfügt über rund 4 Milliarden Adressen, was heutzutage nicht mehr ausreicht. IPv6 ist der Nachfolger mit praktisch unbegrenzt vielen Adressen. Viele moderne Heimnetzwerke, Mobilfunknetze und Internetanbieter unterstützen IPv6 bereits vollständig.
ipv6info.why.h=Warum ist SABI nur über IPv6 erreichbar?
ipv6info.why.t=SABI wird auf einem Heimserver betrieben, der ausschließlich eine IPv6-Adresse besitzt. IPv6 ist die Zukunft des Internets – der Betrieb über IPv6 ist für private Projekte unkomplizierter und kostengünstiger.
ipv6info.corporate.h=Warum funktioniert es nicht aus dem Firmennetzwerk?
ipv6info.corporate.t=Viele Unternehmen setzen noch auf ältere Netzwerkinfrastruktur, die ausschließlich IPv4 unterstützt. IPv6-Pakete werden dort häufig geblockt oder nicht weitergeleitet. Auch manche Heimrouter älterer Generation oder DSL-Anschlüsse ohne IPv6-Option können SABI nicht erreichen.
ipv6info.mobile.h=Lösung: Mobiles Netz nutzen
ipv6info.mobile.t=Moderne Mobilfunknetze (4G/5G) unterstützen IPv6 in der Regel vollständig. Wenn SABI über WLAN nicht erreichbar ist, hilft es meistens, das WLAN zu deaktivieren und stattdessen das mobile Datennetz zu verwenden. Alternativ kann man prüfen, ob der eigene Router IPv6 unterstützt – zum Beispiel auf <a href="https://test-ipv6.com" target="_blank" style="color:#0369a1;text-decoration:underline;">test-ipv6.com</a>.
ipv6info.back.l=Zurück zur Startseite

