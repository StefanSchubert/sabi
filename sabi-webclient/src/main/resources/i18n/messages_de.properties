userprofile.aiexport.header.h=KI-Chatbot Datenexport
userprofile.aiexport.description.t=KI-Chatbots wie ChatGPT k\u00f6nnen deine Messwerte analysieren und dir Hinweise zu m\u00f6glichen Problemen in deinem Riff geben. Lade hier alle deine Daten als JSON-Datei herunter und f\u00fcge sie in ein KI-Chat-Gespr\u00e4ch ein, um fundierte Ratschl\u00e4ge zu erhalten.
