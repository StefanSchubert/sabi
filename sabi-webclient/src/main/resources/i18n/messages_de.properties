register.terms_of_usage.t=Willkommen bei Sabi! Indem Sie sich registrieren und unseren Dienst nutzen, stimmen Sie den folgenden Bedingungen zu:</br>\
<p><b>1. Open-Source-Natur des Projekts</b><br/>\
Sabi ist ein Open-Source-Projekt, dessen Quellcode und Dokumentation unter GitHub verf\u00fcgbar sind. \
Durch Ihre Nutzung des Dienstes erkl\u00e4ren Sie sich damit einverstanden, dass der Dienst "wie gesehen" \
bereitgestellt wird, ohne Garantie jeglicher Art.\
</p>\
<p><b>2. Verantwortung des Benutzers</b><br/>\
Sie sind f\u00fcr die Nutzung des Dienstes und die Inhalte, die Sie auf unserer Plattform erstellen oder teilen, \
verantwortlich. Bitte verwenden Sie den Dienst nur f\u00fcr rechtm\u00e4\u00dfige Zwecke.</p>\
<p><b>3. Datenschutz</b><br/>\
Unsere Datenschutzerkl\u00e4rung (gem\u00e4\u00df DSGVO) beschreibt, wie wir mit Ihren Daten umgehen. Sie finden diese unter <a href="./gdpr.xhtml">DSGVO</a></p>\
<p><b>4. Haftungsausschluss</b><br/>\
Wir \u00dcbernehmen keine Haftung f\u00fcr Verluste oder Sch\u00e4den, die durch die Nutzung von Sabi entstehen k\u00f6nnten. \
Sabi wird als Open-Source-Projekt bereitgestellt, ohne Garantien oder Zusicherungen.</p>\
<p><b>5. \u00c4nderungen der Bedingungen</b><br/>\
Diese Nutzungsbedingungen k\u00f6nnen gelegentlich aktualisiert werden. Bitte \u00fcberpr\u00fcfen Sie diese Seite regelm\u00e4\u00dfig, um \u00fcber \u00c4nderungen informiert zu bleiben.</p>\
<p><b>6. Kontakt</b><br/>\
Bei Fragen oder Anliegen w\u00e4hlen Sie bitte nach dem Login im Hauptmenu den Punkt "R\u00fcckmeldungen" aus. Alternativ finden Sie meine Kontaktdaten im <a href="./impressum.xhtml">Impressum</a>.</b>
