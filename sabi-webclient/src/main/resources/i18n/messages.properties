ipv6info.title.h=SABI – IPv6-only Service
ipv6info.intro.t=SABI is exclusively reachable via IPv6. This page explains what that means and why the service may not be accessible from certain networks.
ipv6info.whatis.h=What is IPv6?
ipv6info.whatis.t=The internet uses addresses to identify devices – similar to house numbers. IPv4 (the older version) provides around 4 billion addresses, which is no longer sufficient. IPv6 is the successor with virtually unlimited addresses. Most modern home networks, mobile networks, and internet providers already fully support IPv6.
ipv6info.why.h=Why is SABI only reachable via IPv6?
ipv6info.why.t=SABI runs on a home server that only has an IPv6 address. IPv6 is the future of the internet – for private projects it is simpler and more cost-effective to operate.
ipv6info.corporate.h=Why doesn’t it work from a corporate network?
ipv6info.corporate.t=Many companies still rely on older network infrastructure that only supports IPv4. IPv6 packets are often blocked or not forwarded there. Some older home routers or DSL connections without IPv6 support may also be unable to reach SABI.
ipv6info.mobile.h=Solution: Use mobile data
ipv6info.mobile.t=Modern mobile networks (4G/5G) generally support IPv6 fully. If SABI is not reachable via Wi-Fi, disabling Wi-Fi and switching to mobile data usually helps. You can also check whether your router supports IPv6 – for example at <a href="https://test-ipv6.com" target="_blank" style="color:#0369a1;text-decoration:underline;">test-ipv6.com</a>.
ipv6info.back.l=Back to home page

