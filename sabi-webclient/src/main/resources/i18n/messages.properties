# Google OIDC Privacy Disclosure (Google API Services User Data Policy compliance)
gdpr.google.h=Google User Data – Privacy Disclosure
gdpr.google.data_accessed.h=Data Accessed
gdpr.google.data_accessed.t=When you choose to sign in with Google, SABI requests the following data from your Google account via OpenID Connect (OIDC):<br/><ul><li><b>Email address</b> – used as your unique account identifier</li><li><b>Display name</b> (profile name) – used as your initial username</li><li><b>OpenID subject identifier</b> – a unique, anonymous ID used to link your Google account to your SABI account</li></ul>SABI does <b>not</b> access your Google contacts, calendar, files, photos, or any other Google service data.
gdpr.google.data_usage.h=Data Usage
gdpr.google.data_usage.t=The Google user data described above is used exclusively for the following purposes:<br/><ul><li><b>Authentication</b> – to verify your identity and log you in</li><li><b>Account creation</b> – to create your SABI user account on first login</li><li><b>Account linking</b> – to associate subsequent Google logins with your existing SABI account</li></ul>SABI does not use your Google data for advertising, profiling, analytics, or any purpose other than the functionality described above.
gdpr.google.data_sharing.h=Data Sharing
gdpr.google.data_sharing.t=SABI does <b>not</b> share, sell, rent, or disclose your Google user data to any third party. Your data is used solely within the SABI application for the purposes stated above. There are no third-party analytics services, advertising networks, or data brokers that receive your Google data through SABI.
gdpr.google.data_storage.h=Data Storage & Protection
gdpr.google.data_storage.t=Your Google user data (email, display name, OpenID subject ID) is stored in the SABI database, which is hosted on servers located within the European Union.<br/>Security measures include:<ul><li>Encrypted transmission via HTTPS/TLS for all data in transit</li><li>Database access restricted to the SABI application backend only</li><li>OAuth tokens are <b>not</b> persisted – they are used only during the authentication flow and discarded afterwards</li></ul>
gdpr.google.data_retention.h=Data Retention & Deletion
gdpr.google.data_retention.t=Your Google user data is retained as long as your SABI account exists. You can request complete deletion of your account and all associated data (including Google-derived data) at any time by contacting us at <a href="mailto:stefan@bluewhale.de" style="color:#0369a1;text-decoration:underline;">stefan@bluewhale.de</a>.<br/>Upon deletion, all personal data including your email address, display name, and OpenID subject identifier will be permanently removed from our systems. Additionally, you can revoke SABI's access to your Google account at any time via your <a href="https://myaccount.google.com/permissions" target="_blank" style="color:#0369a1;text-decoration:underline;">Google Account Permissions</a> page.
