register.terms_of_usage.h=Condizioni di utilizzo
register.terms_of_usage.t=Benvenuto su Sabi! Registrandoti e utilizzando il nostro servizio, accetti i seguenti termini e condizioni:</br>\
<p><b>1. Natura open source del progetto</b><br/>\
Sabi \u00e8 un progetto open source il cui codice sorgente e la documentazione sono disponibili su GitHub.\
 \
Utilizzando il servizio, l'utente accetta che il servizio sia fornito \u00abcos\u00ec com'\u00e8\u00bb,\
 senza garanzie di alcun tipo.\
</p>\
<p><b>2. Responsabilit\u00e0 dell'utente</b><br/>\
L'utente \u00e8 responsabile dell'utilizzo del servizio e dei contenuti creati o condivisi sulla nostra piattaforma.\
 Si prega di utilizzare il servizio solo per scopi legittimi.\
<p><b>3. Protezione dei dati</b><br/>\
La nostra informativa sulla privacy (ai sensi del GDPR) descrive come trattiamo i tuoi dati. La puoi trovare all'indirizzo <a href="./gdpr.xhtml">GDPR</a></p>\
<p><b>4. Esclusione di responsabilit\u00e0</b><br/>\
Non ci assumiamo alcuna responsabilit\u00e0 per perdite o danni che potrebbero derivare dall'utilizzo di Sabi. \
Sabi \u00e8 fornito come progetto open source, senza garanzie o assicurazioni.\
<p><b>5. Modifiche alle condizioni</b><br/>\
Le presenti condizioni d'uso possono essere aggiornate di tanto in tanto. Si prega di controllare regolarmente questa pagina per rimanere informati sulle modifiche.\
<p><b>6. Contatti</b><br/>\
In caso di domande o richieste, dopo aver effettuato il login selezionare la voce \u00abFeedback\u00bb nel menu principale. In alternativa, i miei dati di contatto sono disponibili nella <a href="./impressum.xhtml">Impressum</a>.</b>

