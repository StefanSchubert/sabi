ipv6info.title.h=SABI – Servizio solo IPv6
ipv6info.intro.t=SABI è accessibile esclusivamente tramite IPv6. Questa pagina spiega cosa significa e perché il servizio potrebbe non essere raggiungibile da alcune reti.
ipv6info.whatis.h=Cos’è IPv6?
ipv6info.whatis.t=Internet usa indirizzi per identificare i dispositivi, come i numeri civici. IPv4 (la versione più vecchia) ha circa 4 miliardi di indirizzi, che non bastano più. IPv6 è il successore con indirizzi praticamente illimitati. La maggior parte delle reti domestiche moderne, reti mobili e provider già supportano IPv6.
ipv6info.why.h=Perché SABI è raggiungibile solo tramite IPv6?
ipv6info.why.t=SABI funziona su un server domestico che ha solo un indirizzo IPv6. IPv6 è il futuro di Internet – per i progetti privati è più semplice ed economico operare.
ipv6info.corporate.h=Perché non funziona dalla rete aziendale?
ipv6info.corporate.t=Molte aziende usano ancora un'infrastruttura di rete obsoleta che supporta solo IPv4. I pacchetti IPv6 vengono spesso bloccati lì. Anche alcuni router domestici più vecchi potrebbero non raggiungere SABI.
ipv6info.mobile.h=Soluzione: usare i dati mobili
ipv6info.mobile.t=Le reti mobili moderne (4G/5G) supportano generalmente IPv6. Se SABI non è raggiungibile tramite Wi-Fi, disattivare il Wi-Fi e usare i dati mobili di solito aiuta. Puoi anche verificare su <a href="https://test-ipv6.com" target="_blank" style="color:#0369a1;text-decoration:underline;">test-ipv6.com</a>.
ipv6info.back.l=Torna alla pagina iniziale

