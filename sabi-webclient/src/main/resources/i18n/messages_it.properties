# Google OIDC Privacy Disclosure (Google API Services User Data Policy compliance)
gdpr.google.h=Dati utente Google \u2013 Informativa sulla privacy
gdpr.google.data_accessed.h=Dati consultati
gdpr.google.data_accessed.t=Quando scegli di accedere con Google, SABI richiede i seguenti dati dal tuo account Google tramite OpenID Connect (OIDC):<br/><ul><li><b>Indirizzo e-mail</b> \u2013 utilizzato come identificativo unico del tuo account</li><li><b>Nome visualizzato</b> (nome profilo) \u2013 utilizzato come nome utente iniziale</li><li><b>Identificatore OpenID</b> \u2013 un ID unico e anonimo per collegare il tuo account Google al tuo account SABI</li></ul>SABI <b>non</b> accede ai tuoi contatti, calendario, file, foto o altri servizi Google.
gdpr.google.data_usage.h=Utilizzo dei dati
gdpr.google.data_usage.t=I dati Google sopra descritti vengono utilizzati esclusivamente per i seguenti scopi:<br/><ul><li><b>Autenticazione</b> \u2013 per verificare la tua identit\u00E0 ed effettuare l'accesso</li><li><b>Creazione account</b> \u2013 per creare il tuo account SABI al primo accesso</li><li><b>Collegamento account</b> \u2013 per associare i successivi accessi Google al tuo account SABI esistente</li></ul>SABI non utilizza i tuoi dati Google per pubblicit\u00E0, profilazione, analisi o scopi diversi da quelli descritti.
gdpr.google.data_sharing.h=Condivisione dei dati
gdpr.google.data_sharing.t=SABI <b>non</b> condivide, vende, affitta o divulga i tuoi dati Google a terzi. I tuoi dati sono utilizzati esclusivamente all'interno dell'applicazione SABI per gli scopi indicati. Non esistono servizi di analisi di terze parti, reti pubblicitarie o intermediari di dati che ricevano i tuoi dati Google tramite SABI.
gdpr.google.data_storage.h=Archiviazione & protezione dei dati
gdpr.google.data_storage.t=I tuoi dati Google (e-mail, nome, identificatore OpenID) sono archiviati nel database SABI, ospitato su server situati nell'Unione Europea.<br/>Le misure di sicurezza includono:<ul><li>Trasmissione crittografata tramite HTTPS/TLS</li><li>Accesso al database limitato al backend SABI</li><li>I token OAuth <b>non</b> vengono memorizzati permanentemente \u2013 vengono utilizzati solo durante l'autenticazione e poi eliminati</li></ul>
gdpr.google.data_retention.h=Conservazione & cancellazione
gdpr.google.data_retention.t=I tuoi dati Google vengono conservati finch\u00E9 esiste il tuo account SABI. Puoi richiedere la cancellazione completa in qualsiasi momento contattandoci a <a href="mailto:stefan@bluewhale.de" style="color:#0369a1;text-decoration:underline;">stefan@bluewhale.de</a>.<br/>Puoi anche revocare l'accesso di SABI al tuo account Google in qualsiasi momento tramite le tue <a href="https://myaccount.google.com/permissions" target="_blank" style="color:#0369a1;text-decoration:underline;">autorizzazioni account Google</a>.
