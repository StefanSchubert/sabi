## Connection parameter to the captcha service
captcha:
  backend:
    url: http://localhost:8081/captcha/api

# JSF/Primefaces Config
# possible props see: https://docs.joinfaces.org/current/reference/#properties
# primefaces 11 possible (free) themes are saga, arya, vela, luna-blue
joinfaces:
  jsf:
    project-stage: development
  primefaces:
    # Kein automatisches Theme – wird dynamisch per Session in masterLayout.xhtml gesteuert
    # Light: primefaces-saga-blue  /  Dark: primefaces-arya-blue
    theme: none

# Health check for cloud deployment
# https://docs.spring.io/spring-boot/docs/current/reference/html/production-ready-features.html#production-ready-endpoints-enabling-endpoints
management:
  endpoint:
    health:
      enabled: true
      show-details: always
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: metrics,health,info,prometheus
name: sabi-webclient

# sabi backend can be found (here without /api on purpose)
sabi:
  backend:
    url: http://localhost:8080/sabi
server:
  port: 8088

# OIDC / Google Login (sabi-150)
# Set GOOGLE_OIDC_CLIENT_ID and GOOGLE_OIDC_CLIENT_SECRET as environment variables – never commit real values!
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OIDC_CLIENT_ID:changeme-set-GOOGLE_OIDC_CLIENT_ID-env-var}
            client-secret: ${GOOGLE_OIDC_CLIENT_SECRET:changeme-set-GOOGLE_OIDC_CLIENT_SECRET-env-var}
            scope: openid,email,profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
        provider:
          google:
            issuer-uri: https://accounts.google.com
  error:
    whitelabel:
      enabled: false
    # This will cause error occuring in DsipatcherServlet Context to be routed through the Controller listening on the /error Endpoint
    path: /error
  jackson:
    use-jackson2-defaults: true
  # INTERNATIONALIZATION
  messages:
    basename: i18n/messages
    encoding: UTF-8
  servlet:
    session:
          # dev. setting: short timeout to test session expiry behaviour
          timeout: 3m
    context-path: /
    encoding:
      # Charset of HTTP requests and responses. Added to the "Content-Type" header if not set explicitly.
      charset: UTF-8
      # Enable http encoding support.
      enabled: true
      # Force the encoding to the configured charset on HTTP requests and responses.
      force: true
  tomcat:
    threads:
      max: 50
    connection-timeout: 10s

# Disabling the /v3/api-docs endpoint
springdoc:
  api-docs:
    enabled: false
  # Disabling the swagger-ui
  swagger-ui:
    enabled: false