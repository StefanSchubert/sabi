<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:p="http://primefaces.org/ui">

    <div style="display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:0.4rem 1rem;">
        <span>SABI #{applicationInfo.version}</span>
        <span style="opacity:0.4;">|</span>
        <p:link outcome="/impressum"      value="Impressum"                            id="impressumLink"/>
        <span style="opacity:0.4;">|</span>
        <p:link outcome="/gdpr"           value="#{msg['gdpr.menu.l']}"               id="gdprLink"/>
        <span style="opacity:0.4;">|</span>
        <p:link outcome="/terms_of_usage" value="#{msg['register.terms_of_usage.h']}" id="usageTermsLink"/>
        <span style="opacity:0.4;">|</span>
        <p:link outcome="/credits"        value="Credits"                             id="creditLink"/>
        <span style="opacity:0.4;">|</span>
        <p:link href="https://github.com/StefanSchubert/sabi/issues" value="Report Issues" id="issueLink"/>
        <span style="opacity:0.4;">|</span>
        <em><p:link outcome="/ipv6info" value="#{msg['footer.ipv6only.l']}" id="ipv6infoLink"/></em>
    </div>

</ui:composition>
