<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      lang="#{userSession.language}">

<f:metadata>
    <f:view locale="#{userSession.locale}" language="#{userSession.language}" contentType="text/html" encoding="utf-8"/>
    <f:loadBundle basename="i18n.messages" var="msg"/>
    <ui:insert name="metadata"/>
</f:metadata>

<h:head>
    <title>SABI - Seawater Aquarium Business Intelligence</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta name="theme-color" content="#075985"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="SABI"/>
    <link rel="apple-touch-icon"
          href="#{resource['images:apple-touch-icon.jpg']}"/>
    <link rel="icon"
          type="image/png"
          href="#{resource['images:icons8-crab-64.png']}"/>
    <!-- PrimeFaces Theme – dynamisch per Session: saga-blue (Light) oder arya-blue (Dark) -->
    <link rel="stylesheet"
          href="#{request.contextPath}/jakarta.faces.resource/theme.css.xhtml?ln=primefaces-#{userSession.primeFacesThemeName}"/>
    <h:outputStylesheet library="css" name="sabistyle.css"/>
</h:head>

<h:body styleClass="#{userSession.bodyStyleClass}">

    <header id="header">
        <ui:include src="/template/header.xhtml"/>
    </header>
    <main id="content">
        <ui:insert name="content">Sorry content is missing. Report to site owner.</ui:insert>
    </main>
    <footer id="footer">
        <ui:include src="/template/footer.xhtml"/>
    </footer>

</h:body>
</html>
