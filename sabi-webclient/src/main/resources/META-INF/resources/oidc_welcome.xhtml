<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core">

<f:metadata>
    <f:view locale="#{userSession.locale}" language="#{userSession.language}"
            contentType="text/html" encoding="utf-8"/>
</f:metadata>

<h:head>
    <title>SABI - Seawater Aquarium Business Intelligence</title>
</h:head>

<h:body>
    <ui:composition template="/template/masterLayoutNoMenu.xhtml">
        <ui:define name="content">

            <p:panel header="#{msg['oidc.welcome.h']}" style="max-width:600px; margin: 2rem auto;">

                <p:outputLabel escape="false" value="#{msg['oidc.welcome.intro.t']}"/>

                <p:panelGrid columns="1" styleClass="ui-noborder" style="margin-top: 1.5rem;">

                    <p:outputLabel escape="false"
                                   value="#{msg['oidc.welcome.links.t']}"/>

                    <p:panelGrid columns="3" styleClass="ui-noborder" style="margin-top: 0.5rem;">
                        <p:link outcome="/terms_of_usage"
                                value="#{msg['register.terms_of_usage.h']}"
                                target="_blank"/>
                        <h:outputText value="&#160;|&#160;"/>
                        <p:link outcome="/gdpr"
                                value="#{msg['gdpr.menu.l']}"
                                target="_blank"/>
                    </p:panelGrid>

                </p:panelGrid>

                <p:separator style="margin-top: 1.5rem;"/>

                <p:panelGrid columns="2" styleClass="ui-noborder" style="margin-top: 1rem;">
                    <p:commandButton value="#{msg['oidc.welcome.accept.b']}"
                                     action="#{oidcWelcomeView.acceptTerms}"
                                     ajax="false"
                                     styleClass="ui-button-success"/>
                    <p:commandButton value="#{msg['oidc.welcome.decline.b']}"
                                     action="#{oidcWelcomeView.declineTerms}"
                                     ajax="false"
                                     styleClass="ui-button-secondary"/>
                </p:panelGrid>

            </p:panel>

        </ui:define>
    </ui:composition>
</h:body>
</html>
