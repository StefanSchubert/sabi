<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui" xmlns:f="http://xmlns.jcp.org/jsf/core">

<f:metadata>
    <f:view locale="#{userSession.locale}" language="#{userSession.language}" contentType="text/html" encoding="utf-8"/>
    <!-- IMPORTANT: Load the bundle after you set the view locale settings! Otherwise the bundle will always
    answer with the default locale! -->
    <f:loadBundle basename="i18n.messages" var="msg"/>
    <f:viewAction action="#{applicationInfo.fetchCookieAnnouncement}"/>
</f:metadata>

<h:head>
    <title>SABI - Seawater Aquarium Business Intelligence</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta name="theme-color" content="#075985"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="SABI"/>
    <link rel="apple-touch-icon"
          href="#{resource['images:apple-touch-icon.jpg']}"/>
    <link rel="icon" type="image/png"
          href="#{resource['images:icons8-crab-64.png']}"/>
    <h:outputStylesheet library="css" name="sabistyle.css"/>
    <meta name="google-site-verification" content="MGgXPd9KR8eEG4c2mPEtqtsoT0QxgO3cU6MAxvgYvEY"/>
</h:head>

<h:body styleClass="splashscreen">

    <h2>#{msg['login.welcome.h']}</h2>
    <div style="height:12vh; min-height:40px;"/>
    <div style="background:rgba(255,255,255,0.88); border-radius:8px; padding:1.25rem 1.5rem;
                max-width:500px; width:100%; margin:0 auto;
                box-shadow:0 4px 20px rgba(0,0,0,0.25);">
        <p style="margin:0 0 1.2rem; color:#1e293b; font-size:0.97rem;">
            <p:outputLabel escape="false" value="#{msg['welcome.t.introduction']}"/>
        </p>
        <p style="margin:0.75rem 0 0.5rem; color:#1e293b; font-size:0.97rem; text-align:center;">
            #{msg['welcome.countdown.prefix.t']}
            <strong><span id="countdown">10</span></strong>
            #{msg['welcome.countdown.suffix.t']}
        </p>
        <p style="margin:0.5rem 0 0; text-align:center;">
            <a href="login.xhtml" style="color:#0369a1; text-decoration:underline; font-size:0.97rem;">#{msg['welcome.proceed.l']}</a>
        </p>
        <script type="text/javascript">
            //<![CDATA[
            (function() {
                var seconds = 10;
                var el = document.getElementById('countdown');
                function tick() {
                    seconds--;
                    if (seconds <= 0) {
                        window.location.href = 'login.xhtml';
                    } else {
                        el.textContent = seconds;
                        setTimeout(tick, 1000);
                    }
                }
                setTimeout(tick, 1000);
            })();
            //]]>
        </script>
    </div>
    <ui:remove>
        <!-- IPV6-Only-Announcement
        <p:messages id="msg1" for="additionalHint" showDetail="true" closable="true">
            <p:autoUpdate/>
        </p:messages>
        -->
    </ui:remove>

    <p:messages id="msg2" for="common" showDetail="true" closable="true">
        <p:autoUpdate/>
    </p:messages>

    <footer id="footer" style="position:fixed; bottom:0; width:100%; padding:0.5rem 0; text-align:center; font-size:0.8rem;">
        <ui:include src="/template/footer.xhtml"/>
    </footer>

</h:body>
</html>
