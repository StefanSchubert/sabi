<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui" xmlns:f="http://xmlns.jcp.org/jsf/core">

<f:metadata>
    <f:view locale="#{userSession.locale}" language="#{userSession.language}" contentType="text/html" encoding="utf-8"/>
</f:metadata>

<h:head>
    <title>SABI - Seawater Aquarium Business Intelligence</title>
</h:head>

<h:body>
    <ui:composition template="/template/masterLayout.xhtml">

        <ui:define name="content">

            <p:messages id="messages" showDetail="true" closable="true">
                <p:autoUpdate/>
            </p:messages>

            <h:form id="master">
                <p:dataList value="#{tankListView.tanks}" var="tank" type="definition">
                    <f:facet name="header">#{msg['tankview.tanklist.h']}</f:facet>

                    <p:panelGrid columns="2" layout="grid"
                                 style="width:100%; border:none;"
                                 columnClasses="ui-grid-col-5,ui-grid-col-7">

                        <p:outputLabel value="#{msg['tank.form.photo.label']}"/>
                        <p:outputPanel>
                            <p:graphicImage rendered="#{tank.hasPhoto}"
                                            value="#{request.contextPath}/secured/tankPhoto?tankId=#{tank.id}"
                                            style="max-width:80px; max-height:60px; border-radius:4px; display:block;"/>
                            <h:panelGroup layout="inline" rendered="#{not tank.hasPhoto}"
                                          styleClass="sabi-fish-placeholder sabi-fish-placeholder-sm"/>
                        </p:outputPanel>

                        <p:outputLabel value="#{msg['tankview.description.l']}"/>
                        <p:outputLabel value="#{tank.description}" style="font-weight:600;"/>

                        <p:outputLabel value="#{msg['tankview.waterType.l']}"/>
                        <p:outputLabel value="#{tankListView.translatedWaterType[tank.waterType]}"/>

                        <p:outputLabel value="#{msg['tankview.volume.gross.l']}"/>
                        <p:outputLabel value="#{tank.size} #{tank.sizeUnit.unitSign}"/>

                        <p:outputLabel value="#{tank.sizeNet != null ? msg['tankview.volume.net.l'] : ''}"/>
                        <p:outputLabel value="#{tank.sizeNet != null ? tank.sizeNet.toString().concat(' ').concat(tank.sizeUnit.unitSign) : ''}"/>

                        <p:outputLabel value="#{msg['tankview.inceptionDate.l']}"/>
                        <p:outputLabel value="#{tank.inceptionDate}">
                            <!-- FIXME proper Timezone handling when we have the user profile -->
                            <f:convertDateTime dateStyle="medium" type="date" timeZone="Europe/Berlin"/>
                        </p:outputLabel>

                        <p:outputLabel value="#{msg['tankview.tempApiKey.l']}"/>
                        <p:outputPanel>
                            <p:outputLabel rendered="#{tank.temperatureApiKey != null}"
                                           value="#{tank.temperatureApiKey}"
                                           style="font-size:0.8rem; word-break:break-all;"/>
                            <p:commandButton rendered="#{tank.temperatureApiKey == null}"
                                             value="#{msg['tankview.tempApiKey.b']}"
                                             action="#{tankListView.generateTemperatureApiKey(tank)}"
                                             id="temKeyAction" icon="pi pi-key"
                                             update=":master" title="#{msg['tankview.tempApiKey.b']}"/>
                        </p:outputPanel>

                        <!-- Action Buttons -->
                        <p:outputPanel>&#160;</p:outputPanel>
                        <p:outputPanel style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                            <p:commandButton value="#{msg['common.edit.b']}"
                                             action="#{tankListView.edit(tank)}"
                                             id="editAction" icon="pi pi-pencil"
                                             title="#{msg['common.edit.b']}"/>
                            <p:commandButton value="#{msg['common.delete.b']}"
                                             action="#{tankListView.delete(tank)}"
                                             id="delAction" ajax="true"
                                             update=":master" icon="pi pi-trash"
                                             styleClass="ui-button-danger"
                                             title="#{msg['common.delete.b']}"/>
                        </p:outputPanel>
                    </p:panelGrid>

                    <p:separator/>

                </p:dataList>

                <div style="margin-top:0.75rem;">
                    <p:commandButton value="#{msg['common.add.b']}"
                                     action="#{tankListView.addTank}"
                                     id="addAction" icon="pi pi-plus"
                                     title="#{msg['common.add.b']}"/>
                </div>
            </h:form>

        </ui:define>

    </ui:composition>
</h:body>
</html>
