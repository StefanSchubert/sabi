<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<f:metadata>
    <f:view locale="#{userSession.locale}" language="#{userSession.language}" contentType="text/html" encoding="utf-8"/>
</f:metadata>
<h:head><title>SABI - Catalogue Administration</title></h:head>
<h:body>
    <ui:composition template="/template/masterLayout.xhtml">
        <ui:define name="content">

            <h2 style="color:#075985;">#{msg['fishcatalogue.admin.title']}</h2>

            <h:form id="adminForm">
                <p:messages id="adminMessages" showDetail="true" closable="true"/>

                <!-- remoteCommands OUTSIDE the panels they update — prevents autoRun infinite loop -->
                <p:remoteCommand name="sabiLoadProposals"
                                 actionListener="#{fishCatalogueAdminView.refreshProposals()}"
                                 update="pendingPanel"
                                 autoRun="true"/>
                <p:remoteCommand name="sabiLoadCatalogue"
                                 actionListener="#{fishCatalogueAdminView.refreshCatalogue()}"
                                 update="catalogueBrowserPanel"
                                 autoRun="true"/>

                <!-- ═══════════════════════════════════════════════════
                     SECTION 1 — Pending Proposals (FR-021)
                     ═══════════════════════════════════════════════════ -->
                <p:panel id="pendingPanel" style="margin-bottom:2rem;">
                    <f:facet name="header">
                        <span style="font-weight:600;">#{msg['fishcatalogue.admin.pending.list.title']}</span>
                    </f:facet>


                    <!-- Pending Proposals Table (FR-021) -->
                    <p:dataTable id="pendingTable"
                                 var="proposal"
                                 value="#{fishCatalogueAdminView.pendingProposals}"
                                 emptyMessage="#{msg['common.no.data.l']}">

                        <p:column headerText="#{msg['fishcatalogue.scientificname.label']}">
                            <p:outputLabel value="#{proposal.scientificName}" style="font-style:italic;"/>
                        </p:column>

                        <p:column headerText="#{msg['fishcatalogue.admin.submissiondate.label']}">
                            <p:outputLabel value="#{proposal.proposalDate}">
                                <f:convertDateTime locale="#{userSession.locale}" type="localDate"/>
                            </p:outputLabel>
                        </p:column>

                        <p:column headerText="#{msg['fishcatalogue.admin.proposer.label']}">
                            <!-- anonymised: show only user ID fragment -->
                            <p:outputLabel value="User ##{proposal.proposerUserId}"/>
                        </p:column>

                        <p:column headerText="" style="width:5rem; text-align:center;">
                            <p:commandButton icon="pi pi-search"
                                             title="#{msg['common.edit.b']}"
                                             actionListener="#{fishCatalogueAdminView.onOpenProposal(proposal)}"
                                             update=":adminForm:proposalDetailDialog"
                                             oncomplete="PF('proposalDetailWidget').show()"/>
                        </p:column>

                    </p:dataTable>
                </p:panel>

                <!-- Detail Dialog — inside adminForm so update=":adminForm" works from approve/reject buttons -->
                <p:dialog id="proposalDetailDialog"
                          header="#{fishCatalogueAdminView.selectedProposal != null ? fishCatalogueAdminView.selectedProposal.scientificName : ''}"
                          widgetVar="proposalDetailWidget"
                          modal="true"
                          responsive="true"
                          width="700"
                          closeOnEscape="true"
                          dynamic="true">

                    <!-- NO nested h:form — buttons submit via parent adminForm -->
                    <p:messages id="detailMessages" showDetail="true" closable="true"/>

                    <p:tabView rendered="#{fishCatalogueAdminView.selectedProposal != null}">
                        <p:tab title="#{msg['fishcatalogue.tab.de']}">
                            <p:outputLabel value="#{fishCatalogueAdminView.selectedProposal.i18nEntries[0].commonName}" style="display:block;"/>
                            <p:outputLabel value="#{fishCatalogueAdminView.selectedProposal.i18nEntries[0].description}" style="display:block;"/>
                            <p:outputLabel value="#{fishCatalogueAdminView.selectedProposal.i18nEntries[0].referenceUrl}" style="display:block;"/>
                        </p:tab>
                        <p:tab title="#{msg['fishcatalogue.tab.en']}">
                            <p:outputLabel value="#{fishCatalogueAdminView.selectedProposal.i18nEntries[1].commonName}" style="display:block;"/>
                            <p:outputLabel value="#{fishCatalogueAdminView.selectedProposal.i18nEntries[1].description}" style="display:block;"/>
                            <p:outputLabel value="#{fishCatalogueAdminView.selectedProposal.i18nEntries[1].referenceUrl}" style="display:block;"/>
                        </p:tab>
                    </p:tabView>

                    <!-- Rejection reason -->
                    <div class="p-field p-mb-2" style="margin-top:1rem;">
                        <p:outputLabel for="rejectionReason"
                                       value="#{msg['fishcatalogue.admin.rejection.reason.label']}"
                                       style="display:block;"/>
                        <p:inputTextarea id="rejectionReason"
                                         value="#{fishCatalogueAdminView.rejectionReason}"
                                         rows="3"
                                         style="width:100%;"/>
                    </div>

                    <div style="display:flex; gap:0.5rem; margin-top:1rem;">
                        <!-- Approve (style: green #065f46 on #d1fae5 = WCAG 7:1) -->
                        <p:commandButton value="#{msg['fishcatalogue.admin.approve.button']}"
                                         icon="pi pi-check"
                                         style="background:#065f46; border-color:#065f46; color:#ffffff;"
                                         actionListener="#{fishCatalogueAdminView.onApprove()}"
                                         update=":adminForm"
                                         oncomplete="PF('proposalDetailWidget').hide();"/>
                        <!-- Reject (style: red #991b1b on white = WCAG ~6:1) -->
                        <p:commandButton value="#{msg['fishcatalogue.admin.reject.button']}"
                                         icon="pi pi-times"
                                         style="background:#991b1b; border-color:#991b1b; color:#ffffff;"
                                         actionListener="#{fishCatalogueAdminView.onReject()}"
                                         update=":adminForm"
                                         oncomplete="PF('proposalDetailWidget').hide();"/>
                        <p:commandButton value="#{msg['common.cancel.b']}"
                                         icon="pi pi-ban"
                                         styleClass="ui-button-secondary"
                                         onclick="PF('proposalDetailWidget').hide(); return false;"/>
                    </div>

                </p:dialog>

                <!-- ═══════════════════════════════════════════════════
                     SECTION 2 — Full Catalogue Browser + Inline Editor
                     ═══════════════════════════════════════════════════ -->
                <p:panel id="catalogueBrowserPanel">
                    <f:facet name="header">
                        <span style="font-weight:600;">#{msg['fishcatalogue.admin.catalogue.browser.title']}</span>
                    </f:facet>


                    <!-- Two-column layout: left = entry list, right = editor -->
                    <p:panelGrid columns="2"
                                 style="width:100%; border:none;"
                                 columnClasses="ui-g-4,ui-g-8">

                        <!-- LEFT: entry list -->
                        <p:panel id="entryListPanel"
                                 style="height:600px; overflow-y:auto; border-right:1px solid #e5e7eb; padding-right:0.5rem;">
                            <p:dataTable id="catalogueTable"
                                         var="entry"
                                         value="#{fishCatalogueAdminView.catalogueEntries}"
                                         emptyMessage="#{msg['common.no.data.l']}"
                                         rowStyleClass="#{fishCatalogueAdminView.selectedEntry != null and entry.id eq fishCatalogueAdminView.selectedEntry.id ? 'sabi-selected-row' : ''}"
                                         style="width:100%;">

                                <p:column headerText="#{msg['fishcatalogue.scientificname.label']}">
                                    <p:commandLink value="#{entry.scientificName}"
                                                   style="font-style:italic; color:#0369a1; text-decoration:underline;"
                                                   actionListener="#{fishCatalogueAdminView.onSelectEntry(entry)}"
                                                   update=":adminForm:editorPanel"/>
                                </p:column>

                                <p:column headerText="#{msg['fishcatalogue.status.label']}" style="width:7rem; text-align:center;">
                                    <p:tag rendered="#{entry.status.name() == 'PUBLIC'}"
                                           value="#{msg['fishcatalogue.status.public']}"
                                           severity="success"/>
                                    <p:tag rendered="#{entry.status.name() == 'PENDING'}"
                                           value="#{msg['fishcatalogue.status.pending']}"
                                           severity="warn"/>
                                    <p:tag rendered="#{entry.status.name() == 'REJECTED'}"
                                           value="#{msg['fishcatalogue.status.rejected']}"
                                           severity="danger"/>
                                </p:column>

                            </p:dataTable>
                        </p:panel>

                        <!-- RIGHT: inline editor -->
                        <p:panel id="editorPanel" style="padding-left:1rem;">

                            <!-- Placeholder when nothing selected -->
                            <p:panel rendered="#{fishCatalogueAdminView.selectedEntry == null}"
                                     style="color:#6b7280; font-style:italic; padding:2rem; text-align:center;">
                                <p:outputLabel value="#{msg['fishcatalogue.admin.editor.select.hint']}"/>
                            </p:panel>

                            <!-- Editor for selected entry -->
                            <h:panelGroup rendered="#{fishCatalogueAdminView.selectedEntry != null}">

                                <h3 style="color:#075985; margin-top:0;">#{msg['fishcatalogue.admin.editor.title']}</h3>

                                <!-- Scientific Name -->
                                <div class="p-field p-mb-2">
                                    <p:outputLabel for="editorScientificName"
                                                   value="#{msg['fishcatalogue.scientificname.label']}"
                                                   style="display:block; font-weight:600;"/>
                                    <p:inputText id="editorScientificName"
                                                 value="#{fishCatalogueAdminView.selectedEntry.scientificName}"
                                                 required="true"
                                                 maxlength="255"
                                                 style="width:100%;"/>
                                    <p:message for="editorScientificName"/>
                                </div>

                                <!-- Status display (read-only) -->
                                <div class="p-field p-mb-2">
                                    <p:outputLabel value="#{msg['fishcatalogue.status.label']}"
                                                   style="display:block; font-weight:600;"/>
                                    <p:tag rendered="#{fishCatalogueAdminView.selectedEntry.status.name() == 'PUBLIC'}"
                                           value="#{msg['fishcatalogue.status.public']}"
                                           severity="success"/>
                                    <p:tag rendered="#{fishCatalogueAdminView.selectedEntry.status.name() == 'PENDING'}"
                                           value="#{msg['fishcatalogue.status.pending']}"
                                           severity="warn"/>
                                    <p:tag rendered="#{fishCatalogueAdminView.selectedEntry.status.name() == 'REJECTED'}"
                                           value="#{msg['fishcatalogue.status.rejected']}"
                                           severity="danger"/>
                                </div>

                                <!-- i18n Tabs: DE / EN / ES / FR / IT -->
                                <p:tabView style="margin-top:1rem;">

                                    <p:tab title="#{msg['fishcatalogue.tab.de']}">
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.commonname.label']}" style="display:block;"/>
                                            <p:inputText value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[0].commonName}"
                                                         maxlength="255" style="width:100%;"/>
                                        </div>
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.description.label']}" style="display:block;"/>
                                            <p:inputTextarea value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[0].description}"
                                                             maxlength="2000" rows="4" style="width:100%;"/>
                                        </div>
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.refurl.label']}" style="display:block;"/>
                                            <p:inputText value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[0].referenceUrl}"
                                                         maxlength="512" style="width:100%;"/>
                                        </div>
                                    </p:tab>

                                    <p:tab title="#{msg['fishcatalogue.tab.en']}">
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.commonname.label']}" style="display:block;"/>
                                            <p:inputText value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[1].commonName}"
                                                         maxlength="255" style="width:100%;"/>
                                        </div>
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.description.label']}" style="display:block;"/>
                                            <p:inputTextarea value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[1].description}"
                                                             maxlength="2000" rows="4" style="width:100%;"/>
                                        </div>
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.refurl.label']}" style="display:block;"/>
                                            <p:inputText value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[1].referenceUrl}"
                                                         maxlength="512" style="width:100%;"/>
                                        </div>
                                    </p:tab>

                                    <p:tab title="#{msg['fishcatalogue.tab.es']}">
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.commonname.label']}" style="display:block;"/>
                                            <p:inputText value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[2].commonName}"
                                                         maxlength="255" style="width:100%;"/>
                                        </div>
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.description.label']}" style="display:block;"/>
                                            <p:inputTextarea value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[2].description}"
                                                             maxlength="2000" rows="4" style="width:100%;"/>
                                        </div>
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.refurl.label']}" style="display:block;"/>
                                            <p:inputText value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[2].referenceUrl}"
                                                         maxlength="512" style="width:100%;"/>
                                        </div>
                                    </p:tab>

                                    <p:tab title="#{msg['fishcatalogue.tab.fr']}">
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.commonname.label']}" style="display:block;"/>
                                            <p:inputText value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[3].commonName}"
                                                         maxlength="255" style="width:100%;"/>
                                        </div>
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.description.label']}" style="display:block;"/>
                                            <p:inputTextarea value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[3].description}"
                                                             maxlength="2000" rows="4" style="width:100%;"/>
                                        </div>
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.refurl.label']}" style="display:block;"/>
                                            <p:inputText value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[3].referenceUrl}"
                                                         maxlength="512" style="width:100%;"/>
                                        </div>
                                    </p:tab>

                                    <p:tab title="#{msg['fishcatalogue.tab.it']}">
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.commonname.label']}" style="display:block;"/>
                                            <p:inputText value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[4].commonName}"
                                                         maxlength="255" style="width:100%;"/>
                                        </div>
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.description.label']}" style="display:block;"/>
                                            <p:inputTextarea value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[4].description}"
                                                             maxlength="2000" rows="4" style="width:100%;"/>
                                        </div>
                                        <div class="p-field p-mb-2">
                                            <p:outputLabel value="#{msg['fishcatalogue.i18n.refurl.label']}" style="display:block;"/>
                                            <p:inputText value="#{fishCatalogueAdminView.selectedEntry.i18nEntries[4].referenceUrl}"
                                                         maxlength="512" style="width:100%;"/>
                                        </div>
                                    </p:tab>

                                </p:tabView>

                                <!-- Save / Cancel buttons.
                                     Save is only enabled for PUBLIC entries (admin can always edit those).
                                     PENDING entries are handled via the pending proposals dialog above.
                                     REJECTED entries are read-only per FR-019. -->
                                <p:panel rendered="#{fishCatalogueAdminView.selectedEntry.status.name() != 'PUBLIC'}"
                                         style="background:#fef3c7; border:1px solid #d97706; padding:0.5rem; border-radius:4px; margin-top:1rem; color:#92400e;">
                                    <p:outputLabel rendered="#{fishCatalogueAdminView.selectedEntry.status.name() == 'PENDING'}"
                                                   value="#{msg['fishcatalogue.admin.editor.pending.hint']}"/>
                                    <p:outputLabel rendered="#{fishCatalogueAdminView.selectedEntry.status.name() == 'REJECTED'}"
                                                   value="#{msg['fishcatalogue.admin.editor.rejected.hint']}"/>
                                </p:panel>

                                <div style="display:flex; gap:0.5rem; margin-top:1rem; justify-content:flex-end;">
                                    <p:commandButton value="#{msg['common.save.b']}"
                                                     icon="pi pi-check"
                                                     style="background:#065f46; border-color:#065f46; color:#ffffff;"
                                                     rendered="#{fishCatalogueAdminView.selectedEntry.status.name() == 'PUBLIC'}"
                                                     actionListener="#{fishCatalogueAdminView.onSaveEntry()}"
                                                     update=":adminForm:adminMessages :adminForm:catalogueBrowserPanel"/>
                                    <p:commandButton value="#{msg['common.cancel.b']}"
                                                     icon="pi pi-ban"
                                                     styleClass="ui-button-secondary"
                                                     actionListener="#{fishCatalogueAdminView.onCancelEdit()}"
                                                     update=":adminForm:editorPanel"
                                                     immediate="true"/>
                                </div>

                            </h:panelGroup>
                        </p:panel>

                    </p:panelGrid>

                </p:panel>

            </h:form>
        </ui:define>
    </ui:composition>
</h:body>
</html>
