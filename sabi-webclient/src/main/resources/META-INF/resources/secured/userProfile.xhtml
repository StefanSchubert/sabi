<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui" xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:pe="http://primefaces.org/ui/extensions">

<f:metadata>
    <f:view locale="#{userSession.locale}" language="#{userSession.language}" contentType="text/html" encoding="utf-8"/>
</f:metadata>

<h:head>
    <title>SABI - Seawater Aquarium Business Intelligence</title>
</h:head>

<h:body>
    <ui:composition template="/template/masterLayout.xhtml">

        <ui:define name="metadata">
            <!-- will be added to f:metadata section of the master template -->
            <f:viewAction action="#{applicationInfo.fetchMotd}"/>
        </ui:define>

        <ui:define name="content">
            <ui:remove>
                <!--  DO not include calling gravatar here, as this might violate the promise not to pass
                      any personal data to 3rd parties. -->
            </ui:remove>

            <p:panel header="#{msg['userprofile.h']} #{userSession.userName}">

                <p:outputPanel>
                    <h:form id="localeswitcher">
                        <p:panelGrid columns="3" styleClass="ui-fluid center ui-noborder">

                            <p:outputLabel for="localeselection" value="#{msg['userprofile.localechoice.l']}"/>
                            <p:selectOneMenu id="localeselection"
                                             value="#{userProfileView.selectedLocale}"
                                             widgetVar="n" var="c">
                                <pe:convertLocale/>
                                <f:selectItems value="#{userProfileView.supportedLocales}"
                                               var="n"
                                               itemValue="#{n.locale}"
                                               itemLabel="#{n.locale.displayLanguage}"
                                />

                                <p:column>
                                    <img src="#{resource[userProfileView.getFlagResource(c)]}"
                                         alt="#{c.getLanguage()}-Lang Flag"
                                         width="24px" height="24px"/>
                                </p:column>
                                <p:column>
                                    <h:outputText value="#{c.displayLanguage}"/>
                                </p:column>

                            </p:selectOneMenu>

                            <p:commandButton id="updateLocale"
                                             value="#{msg['common.save.b']}"
                                             ajax="false"
                                             action="#{userProfileView.save}"/>

                        </p:panelGrid>

                        <p:panelGrid columns="3" styleClass="ui-fluid center ui-noborder">

                            <p:outputLabel for="darkModeToggle" value="#{msg['userprofile.darkmode.l']}"/>
                            <p:selectBooleanCheckbox id="darkModeToggle"
                                                     value="#{userProfileView.darkModeActive}"/>
                            <p:commandButton id="saveDarkMode"
                                             value="#{msg['common.save.b']}"
                                             ajax="false"
                                             action="#{userProfileView.save}"/>

                        </p:panelGrid>

                        <p:messages id="msg1" for="profileupdate" showDetail="true" closable="true">
                            <p:autoUpdate/>
                        </p:messages>

                    </h:form>


                    <p:divider align="center"/>
                    <p:spacer width="10px"/>

                    <h:form id="pwreset">
                        <p:button value="#{msg['userprofile.pwchange.l']}" outcome="/pwreset"/>
                    </h:form>

                    <p:divider align="center"/>
                    <p:spacer width="10px"/>

                    <p:panel header="#{msg['userprofile.reminderinfo.h']}">

                        <p:outputLabel escape="false" value="#{msg['userprofile.reminderinfo.t']}"/>

                        <h:form id="reminderSelector">

                            <p:panelGrid columns="3" layout="grid" style="border:2;">

                                <p:outputLabel for="addreminderSelection"
                                               value="#{msg['userprofile.meassurement.addreminder.l']}"/>
                                <p:selectOneMenu id="addreminderSelection" value="#{userProfileView.selectedUnitId}"
                                                 style="min-width:14rem; width:100%;">
                                    <f:selectItem itemLabel="#{msg['common.select.l']}" itemValue=""/>
                                    <f:selectItems value="#{userProfileView.knownMeasurementUnits}"
                                                   var="m"
                                                   itemValue="#{m.id}"
                                                   itemLabel="#{m.unitSign}"
                                    />
                                </p:selectOneMenu>

                                <p:commandButton value="#{msg['common.add.b']}"
                                                 action="#{userProfileView.addReminderForMeasurementUnit}"
                                                 update=":reminderTable"/>

                            </p:panelGrid>

                        </h:form>


                        <h:form id="reminderTable">
                            <p:dataTable id="tbl_measurementtasks" var="m"
                                         value="#{userProfileView.measurementReminderTos}"
                                         styleClass="p-mt-2">

                                <p:column headerText="#{msg['userprofile.meassurement.unit.l']}">
                                    <p:outputLabel value="#{m.unitName}"/>
                                </p:column>

                                <p:column headerText="#{msg['userprofile.meassurement.dayinterval.l']}">
                                    <p:inputNumber value="#{m.pastDays}" size="4" maxlength="4"/>
                                </p:column>

                                <p:column headerText="#{msg['userprofile.meassurement.active.l']}">
                                    <p:selectBooleanCheckbox value="#{m.active}"/>
                                </p:column>

                            </p:dataTable>

                            <p:commandButton value="#{msg['common.save.b']}"
                                             update=":reminderTable" ajax="true"
                                             action="#{userProfileView.save}"/>

                            <p:messages id="msg2" for="profileupdate" showDetail="true" closable="true">
                                <p:autoUpdate/>
                            </p:messages>

                        </h:form>
                    </p:panel>

                    <p:divider align="center"/>
                    <p:spacer width="10px"/>

                    <!-- 001-ai-data-export: AI Export Panel (US2 / T027) -->
                    <p:panel header="#{msg['userprofile.aiexport.header.h']}">

                        <p:outputLabel value="#{msg['userprofile.aiexport.description.t']}"/>

                        <h:form id="aiexportform">
                            <p:commandButton ajax="false"
                                             value="#{msg['userprofile.aiexport.download.b']}"
                                             action="#{userProfileView.downloadReefData}"
                                             disabled="#{!userProfileView.hasTanks}"
                                             styleClass="ui-button-primary"/>

                            <p:outputLabel rendered="#{!userProfileView.hasTanks}"
                                           value="#{msg['userprofile.aiexport.notanks.hint.t']}"/>
                        </h:form>

                    </p:panel>

                    <p:divider align="center"/>
                    <p:spacer width="10px"/>

                    <!-- Public HouseReef Report links (social feature) -->
                    <p:panel header="#{msg['housereef.report.link.section.h']}">

                        <p:outputLabel value="#{msg['housereef.report.link.intro.t']}"/>

                        <p:spacer height="12px"/>

                        <h:panelGroup rendered="#{!userProfileView.hasTanks}">
                            <p:outputLabel value="#{msg['userprofile.aiexport.notanks.hint.t']}"/>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{userProfileView.hasTanks}">

                            <!-- Generate new / replace link -->
                            <h:form id="reportLinkForm">
                                <p:panelGrid columns="3" layout="grid" style="border:0;">

                                    <p:outputLabel for="reportTankSelect"
                                                   value="#{msg['housereef.report.link.selecttank.l']}"/>
                                    <p:selectOneMenu id="reportTankSelect"
                                                     value="#{userProfileView.selectedTankIdForLink}"
                                                     style="min-width:14rem; width:100%;">
                                        <f:selectItem itemLabel="#{msg['common.select.l']}" itemValue=""/>
                                        <f:selectItems value="#{userProfileView.activeTanks}"
                                                       var="t"
                                                       itemValue="#{t.id}"
                                                       itemLabel="#{t.description}"/>
                                    </p:selectOneMenu>
                                    <p:spacer/>

                                    <p:outputLabel for="reportValidUntil"
                                                   value="#{msg['housereef.report.link.validuntil.l']}"/>
                                    <p:inputText id="reportValidUntil"
                                                 value="#{userProfileView.newLinkValidUntil}"
                                                 placeholder="2026-12-31T23:59:00"
                                                 style="width:100%;"/>
                                    <p:commandButton value="#{msg['housereef.report.link.generate.b']}"
                                                     action="#{userProfileView.generateReportLink}"
                                                     ajax="false"
                                                     style="background:#065f46; color:#ffffff;"/>

                                </p:panelGrid>

                                <p:messages id="reportLinkMsg" for="messages" showDetail="true" closable="true">
                                    <p:autoUpdate/>
                                </p:messages>

                            </h:form>

                            <!-- Active links table -->
                            <p:spacer height="12px"/>
                            <p:outputLabel value="#{msg['housereef.report.link.current.h']}"
                                           style="font-weight:bold;"/>
                            <p:spacer height="6px"/>

                            <ui:repeat value="#{userProfileView.activeTanks}" var="tank">
                                <h:panelGroup rendered="#{userProfileView.getReportLinkFor(tank.id) != null}">
                        <h:form>
                            <p:panelGrid columns="2" styleClass="ui-noborder" style="margin-bottom:0.5rem;">

                                <h:outputText value="#{msg['housereef.report.link.tank.l']}"/>
                                <h:outputText value="#{tank.description}" style="font-weight:bold;"/>

                                <h:outputText value="#{msg['housereef.report.link.url.l']}"/>
                                <h:outputLink value="#{userProfileView.getPublicReportUrl(userProfileView.getReportLinkFor(tank.id).linkToken)}"
                                              target="_blank"
                                              style="color:#0369a1; word-break:break-all;">
                                    <h:outputText value="#{userProfileView.getPublicReportUrl(userProfileView.getReportLinkFor(tank.id).linkToken)}"/>
                                </h:outputLink>

                                <h:outputText value="#{msg['housereef.report.link.expires.l']}"/>
                                <h:panelGroup>
                                    <h:outputText
                                        value="#{userProfileView.getReportLinkFor(tank.id).validUntil}"
                                        rendered="#{userProfileView.getReportLinkFor(tank.id).validUntil != null}">
                                        <f:convertDateTime locale="#{userSession.locale}" type="localDateTime"/>
                                    </h:outputText>
                                    <h:outputText
                                        value="#{msg['housereef.report.link.noexpiry.l']}"
                                        rendered="#{userProfileView.getReportLinkFor(tank.id).validUntil == null}"/>
                                </h:panelGroup>

                            </p:panelGrid>
                            <p:commandButton value="#{msg['housereef.report.link.delete.b']}"
                                             action="#{userProfileView.deleteReportLink(tank.id)}"
                                             ajax="false"
                                             styleClass="ui-button-danger"/>

                            <!-- 004-aquarium-events: include events opt-in -->
                            <!-- Note: no EL in id/for attributes inside ui:repeat — repeat provides row-level uniqueness -->
                            <p:panelGrid columns="3" styleClass="ui-noborder" style="margin-top:0.5rem;">
                                <p:outputLabel for="includeEventsCb"
                                               value="#{msg['aquariumevent.includeevents.label.l']}"/>
                                <p:selectBooleanCheckbox id="includeEventsCb"
                                                         value="#{userProfileView.includeEventsMap[tank.id]}"/>
                                <p:commandButton value="#{msg['common.save.b']}"
                                                 action="#{userProfileView.saveIncludeEvents(tank.id)}"
                                                 ajax="false"
                                                 styleClass="ui-button-primary"/>
                            </p:panelGrid>
                        </h:form>
                                </h:panelGroup>
                            </ui:repeat>

                        </h:panelGroup>

                    </p:panel>

                </p:outputPanel>

            </p:panel>

        </ui:define>

    </ui:composition>
</h:body>
</html>
