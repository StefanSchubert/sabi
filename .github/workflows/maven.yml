# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build:

    runs-on: ubuntu-latest

    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      # OSS Index deaktiviert: Migration zu Sonatype Guide am 28.04.2026 noch ausstehend,
      # OWASP Plugin unterstützt neuen Endpunkt noch nicht. NVD ist primäre CVE-Quelle.

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'corretto'    
    # maven repo cache save and restore
    - uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-        
    - name: CAPTCHA App
      run: cd captcha; mvn -B compile --file pom.xml
    - name: CAPTCHA OWASP Dependency Check
      run: cd captcha; mvn -B verify -P owasp-check --file pom.xml
    - name: SABI-Boundary install locally for dependend builds
      run: cd sabi-boundary; mvn -B install --file pom.xml
    - name: SABI-Boundary OWASP Dependency Check
      run: cd sabi-boundary; mvn -B verify -P owasp-check --file pom.xml
    - name: SABI-Server App
      run: cd sabi-server; mvn -B compile --file pom.xml
    - name: SABI-Server OWASP Dependency Check
      run: cd sabi-server; mvn -B verify -P owasp-check --file pom.xml
    - name: SABI-Webclient App
      run: cd sabi-webclient; mvn -B compile --file pom.xml
    - name: SABI-Webclient OWASP Dependency Check
      run: cd sabi-webclient; mvn -B verify -P owasp-check --file pom.xml
    - name: SABI-Database OWASP Dependency Check
      run: cd sabi-database; mvn -B verify -P owasp-check --file pom.xml
    - name: GenericPiMetricsEndpoint Helper to measure PIs temperatures
      run: cd devops/GenericPiMetricsEndpoint; mvn -B compile --file pom.xml
  test:

    runs-on: ubuntu-latest

    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      # OSS Index deaktiviert: Migration zu Sonatype Guide am 28.04.2026 noch ausstehend,
      # OWASP Plugin unterstützt neuen Endpunkt noch nicht. NVD ist primäre CVE-Quelle.

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
      # maven repo cache save and restore
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-           
      - name: CAPTCHA App
        run: cd captcha; mvn -B test --file pom.xml
      - name: SABI-Boundary install locally for dependend builds
        run: cd sabi-boundary; mvn -B install --file pom.xml
      - name: SABI-Server APP
        run: cd sabi-server; mvn -B test --file pom.xml
